<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <style>
      @media (prefers-color-scheme: dark) {
        .brain { fill: #816AB7; }
        .accent { fill: #48B0A1; }
        .bg { fill: #0C0E1E; }
      }
      @media (prefers-color-scheme: light) {
        .brain { fill: #6B5B95; }
        .accent { fill: #3A9B8a; }
        .bg { fill: #F5F5F5; }
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="64" height="64" class="bg" rx="8"/>
  
  <!-- Brain icon with neural connections -->
  <g transform="translate(32, 32)">
    <!-- Central brain lobes -->
    <circle cx="-6" cy="-2" r="6" class="brain" opacity="0.9"/>
    <circle cx="6" cy="-2" r="6" class="brain" opacity="0.9"/>
    <circle cx="-6" cy="6" r="5" class="brain" opacity="0.8"/>
    <circle cx="6" cy="6" r="5" class="brain" opacity="0.8"/>
    
    <!-- Neural connections -->
    <circle cx="-10" cy="-8" r="2.5" class="accent"/>
    <circle cx="10" cy="-8" r="2.5" class="accent"/>
    <circle cx="-12" cy="4" r="2" class="accent"/>
    <circle cx="12" cy="4" r="2" class="accent"/>
    <circle cx="0" cy="12" r="2" class="accent"/>
    
    <!-- Connection lines -->
    <line x1="-6" y1="-2" x2="-10" y2="-8" stroke="#816AB7" stroke-width="1.2" opacity="0.6"/>
    <line x1="6" y1="-2" x2="10" y2="-8" stroke="#816AB7" stroke-width="1.2" opacity="0.6"/>
    <line x1="-6" y1="6" x2="-12" y2="4" stroke="#816AB7" stroke-width="1.2" opacity="0.6"/>
    <line x1="6" y1="6" x2="12" y2="4" stroke="#816AB7" stroke-width="1.2" opacity="0.6"/>
    <line x1="-6" y1="6" x2="0" y2="12" stroke="#48B0A1" stroke-width="1.2" opacity="0.6"/>
    <line x1="6" y1="6" x2="0" y2="12" stroke="#48B0A1" stroke-width="1.2" opacity="0.6"/>
  </g>
</svg>