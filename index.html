<!DOCTYPE html>
<html lang="es" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/refugio-sensorial/favicon.svg" />
  <link rel="icon" type="image/png" href="/refugio-sensorial/fav.png" />
  <link rel="apple-touch-icon" href="/refugio-sensorial/fav.png" />
  <link rel="manifest" href="/refugio-sensorial/manifest.json" />

  <!-- Theme -->
  <meta name="theme-color" content="#0C0E1E" />

  <!-- Primary meta -->
  <title>Refugio Sensorial — Recursos para personas neurodivergentes</title>
  <meta name="description" content="Mapa de sitios silenciosos y herramientas digitales para personas neurodivergentes en España. TEA, TDAH, Dislexia, TOC." />
  <meta name="author" content="Almudena Bedoya" />
  <meta name="robots" content="index, follow" />

  <!-- CSP parcial via meta (frame-ancestors y HSTS requieren Cloudflare para funcionar) -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' 'unsafe-inline';
    style-src 'self' https://fonts.googleapis.com https://cdnjs.cloudflare.com https://unpkg.com 'unsafe-inline';
    font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com data:;
    img-src 'self' data: blob: https://*.tile.openstreetmap.org https://*.cartocdn.com https://*.basemaps.cartocdn.com https://n0wtq.github.io https://media1.giphy.com;
    media-src 'self';
    connect-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com;
    worker-src 'self' blob:;
    object-src 'none';
    base-uri 'self';
    form-action 'none';
  " />

  <!-- Open Graph / WhatsApp / redes sociales -->
  <meta property="og:type"         content="website" />
  <meta property="og:url"          content="https://n0wtq.github.io/refugio-sensorial/" />
  <meta property="og:title"        content="Refugio Sensorial — Recursos para personas neurodivergentes" />
  <meta property="og:description"  content="Mapa de sitios silenciosos, herramientas digitales y apoyo en crisis para personas neurodivergentes en España." />
  <meta property="og:image"        content="https://n0wtq.github.io/refugio-sensorial/logo-icon.png" />
  <meta property="og:image:alt"    content="Logotipo de Refugio Sensorial" />
  <meta property="og:image:width"  content="512" />
  <meta property="og:image:height" content="512" />
  <meta property="og:locale"       content="es_ES" />
  <meta property="og:site_name"    content="Refugio Sensorial" />

  <!-- Twitter / X -->
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:title"       content="Refugio Sensorial — Recursos para personas neurodivergentes" />
  <meta name="twitter:description" content="Mapa de sitios silenciosos, herramientas digitales y apoyo en crisis para personas neurodivergentes en España." />
  <meta name="twitter:image"       content="https://n0wtq.github.io/refugio-sensorial/logo-icon.png" />
  <meta name="twitter:image:alt"   content="Logotipo de Refugio Sensorial" />

  <!-- Datos estructurados Schema.org -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "WebSite",
        "@id": "https://n0wtq.github.io/refugio-sensorial/#website",
        "name": "Refugio Sensorial",
        "url": "https://n0wtq.github.io/refugio-sensorial/",
        "description": "Recursos digitales para personas neurodivergentes en España: mapa de lugares silenciosos, herramientas para TEA y TDAH, y apoyo en crisis.",
        "inLanguage": "es-ES",
        "potentialAction": {
          "@type": "SearchAction",
          "target": {
            "@type": "EntryPoint",
            "urlTemplate": "https://n0wtq.github.io/refugio-sensorial/herramientas?q={search_term_string}"
          },
          "query-input": "required name=search_term_string"
        }
      },
      {
        "@type": "Organization",
        "@id": "https://n0wtq.github.io/refugio-sensorial/#organization",
        "name": "Refugio Sensorial",
        "url": "https://n0wtq.github.io/refugio-sensorial/",
        "description": "Proyecto independiente de recursos digitales para personas neurodivergentes en España.",
        "inLanguage": "es-ES",
        "founder": {
          "@type": "Person",
          "name": "Almudena Bedoya"
        },
        "audience": {
          "@type": "Audience",
          "audienceType": "Personas con TEA, TDAH, TOC, Dislexia y otras neurodivergencias"
        }
      }
    ]
  }
  </script>

  <script>
    // Recover path encoded by 404.html redirect (SPA on GitHub Pages)
    (function(l) {
      if (l.search[1] === '/') {
        var decoded = l.search.slice(1).split('&').map(function(s) {
          return s.replace(/~and~/g, '&');
        });
        window.history.replaceState(null, null,
          l.pathname.slice(0, -1) + decoded[0] +
          (decoded[1] ? '?' + decoded[1] : '') + l.hash
        );
      }
    }(window.location));
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    rel="stylesheet"

  />
