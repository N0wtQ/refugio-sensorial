<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mapa de Espacios para autistas</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --ink:        #0f172a;
    --soft-ink:   #64748b;
    --mist:       #f8fafc;
    --fog:        #e2e8f0;
    --white:      #ffffff;
    --border:     #e2e8f0;
    --shadow-sm:  0 1px 3px rgba(15,23,42,0.08);
    --shadow:     0 2px 8px rgba(15,23,42,0.09), 0 1px 3px rgba(15,23,42,0.06);
    --shadow-lg:  0 8px 24px rgba(15,23,42,0.12), 0 2px 8px rgba(15,23,42,0.08);
    --r:          10px;
    --font-head:  'Inter', system-ui, sans-serif;
    --font-body:  'Inter', system-ui, sans-serif;
    --transition: 150ms ease;
    --c-super:    #0d9488;
    --c-super-d:  #f0fdfa;
    --c-bib:      #b45309;
    --c-bib-d:    #fefce8;
    --c-nat:      #16a34a;
    --c-nat-d:    #f0fdf4;
    --c-civico:   #2563eb;
    --c-civico-d: #eff6ff;
    --c-sun:      #d97706;
    --c-sun-d:    #fffbeb;
    --c-aero:     #7c3aed;
    --c-aero-d:   #f5f3ff;
    --c-cultura:  #dc2626;
    --c-cultura-d:#fef2f2;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font-body);
    background: var(--mist);
    color: var(--ink);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* HEADER */
  #header {
    background: var(--ink);
    padding: 0 16px;
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    min-height: 54px; flex-shrink: 0;
    box-shadow: var(--shadow-lg);
    z-index: 1000;
    border-bottom: 1px solid var(--border);
  }
  .logo { display: flex; align-items: center; text-decoration: none; flex-shrink: 0; }
  .logo-img { height: 38px; width: auto; display: block; }
  .header-nav { display: flex; gap: 2px; align-items: center; }
  .header-nav a { padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.55); text-decoration: none; transition: all 150ms ease; }
  .header-nav a:hover { background: rgba(255,255,255,0.08); color: #fff; }
  .header-nav a.active { background: rgba(82,201,185,0.2); color: #52c9b9; }
  .header-nav .cl { color: #E57B86; border: 1px solid rgba(229,123,134,0.25); }
  .header-nav .cl:hover { background: rgba(229,123,134,0.1); }
  :focus-visible { outline: 2px solid var(--c-super); outline-offset: 2px; }

  /* TOOLBAR */
  #toolbar {
    background: var(--white); border-bottom: 1px solid var(--border);
    padding: 6px 16px; display: flex; align-items: center; gap: 4px;
    flex-shrink: 0; z-index: 999; overflow-x: auto; scrollbar-width: none;
    box-shadow: 0 1px 4px rgba(15,23,42,0.05);
  }
  #toolbar::-webkit-scrollbar { display: none; }
  .tb-sep { width: 1px; height: 16px; background: var(--border); flex-shrink: 0; margin: 0 4px; }
  .tb-label { font-size: 9.5px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--soft-ink); flex-shrink: 0; white-space: nowrap; padding-right: 2px; }
  .chip {
    display: flex; align-items: center; gap: 4px; padding: 4px 11px;
    border-radius: 6px; border: 1.5px solid transparent;
    background: var(--mist);
    font-family: var(--font-body); font-size: 11px; font-weight: 500; color: var(--soft-ink);
    cursor: pointer; transition: all var(--transition); white-space: nowrap; flex-shrink: 0;
  }
  .chip:hover { background: var(--fog); color: var(--ink); border-color: var(--border); }
  .chip.active { background: var(--ink); color: #fff; border-color: transparent; }
  .chip.active[data-cat="supermercado"]     { background: var(--c-super);   color:#fff; }
  .chip.active[data-cat="biblioteca"]       { background: var(--c-bib);     color:#fff; }
  .chip.active[data-cat="espacio_natural"]  { background: var(--c-nat);     color:#fff; }
  .chip.active[data-cat="centro_comercial"] { background: var(--c-super);   color:#fff; }
  .chip.active[data-cat="aeropuerto"]       { background: var(--c-aero);    color:#fff; }
  .chip.active[data-cat="sunflower"]        { background: var(--c-sun);     color:#fff; }
  .chip.active[data-cat="cultura"]          { background: var(--c-cultura); color:#fff; }
  .chip.active[data-cat="centro_civico"]    { background: var(--c-civico);  color:#fff; }
  .chip.active[data-cat="hotel"]            { background: var(--c-super);   color:#fff; }
  .spacer { flex: 1; min-width: 8px; }
  #btn-suggest {
    display: flex; align-items: center; gap: 5px; padding: 4px 12px; border-radius: 6px;
    border: 1.5px solid var(--c-super); background: transparent; color: var(--c-super);
    font-family: var(--font-body); font-size: 11.5px; font-weight: 600;
    cursor: pointer; transition: all var(--transition); text-decoration: none; white-space: nowrap; flex-shrink: 0;
  }
  #btn-suggest:hover { background: var(--c-super); color: #fff; }

  /* SEARCH */
  .search-wrap {
    display: flex; align-items: center; gap: 5px;
    background: var(--mist);
    border: 1.5px solid transparent;
    border-radius: 6px;
    padding: 3px 9px;
    min-width: 170px;
    transition: all var(--transition);
    flex-shrink: 0;
  }
  .search-wrap:focus-within {
    border-color: var(--c-super);
    background: var(--white);
    box-shadow: 0 0 0 3px rgba(13,148,136,0.10);
  }
  .search-ico { color: var(--soft-ink); flex-shrink: 0; }
  #search-input {
    border: none; outline: none; background: transparent;
    font-family: var(--font-body); font-size: 11px; color: var(--ink);
    flex: 1; min-width: 0; padding: 0; width: 100%;
  }
  #search-input::placeholder { color: var(--soft-ink); opacity: 1; }
  #search-clear {
    display: none;
    background: none; border: none; padding: 0;
    cursor: pointer; color: var(--soft-ink); font-size: 14px; line-height: 1;
    border-radius: 3px; flex-shrink: 0; align-items: center;
  }
  #search-clear:hover { color: var(--ink); }
  #search-clear.vis { display: flex; }
  @media (max-width: 600px) { .search-wrap { min-width: 120px; } }

  /* MAP */
  #map-container { flex: 1; position: relative; overflow: hidden; }
  #map { width: 100%; height: 100%; }

  /* LEAFLET */
  .leaflet-popup-content-wrapper {
    border-radius: var(--r) !important; box-shadow: var(--shadow-lg) !important;
    padding: 0 !important; overflow: hidden; font-family: var(--font-body) !important;
    min-width: 268px; max-width: 340px;
    border: 1px solid var(--border) !important;
  }
  .leaflet-popup-content { margin: 0 !important; width: auto !important; }
  .leaflet-popup-tip-container { display: none; }
  .leaflet-popup-close-button { color: var(--soft-ink) !important; font-size: 18px !important; top: 10px !important; right: 12px !important; z-index: 10; font-weight: 300 !important; }

  /* POPUP */
  .pop-header { padding: 14px 16px 10px; border-bottom: 1px solid var(--border); background: var(--white); }
  .pop-meta { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; margin-bottom: 6px; }
  .pop-badge {
    display: inline-flex; align-items: center; gap: 3px;
    font-size: 9px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase;
    padding: 2px 7px; border-radius: 4px;
  }
  .badge-supermercado     { background: var(--c-super-d);   color: var(--c-super); }
  .badge-biblioteca       { background: var(--c-bib-d);     color: var(--c-bib); }
  .badge-sala_estudio     { background: var(--c-bib-d);     color: var(--c-bib); }
  .badge-espacio_natural  { background: var(--c-nat-d);     color: var(--c-nat); }
  .badge-centro_civico    { background: var(--c-civico-d);  color: var(--c-civico); }
  .badge-centro_comercial { background: var(--c-super-d);   color: var(--c-super); }
  .badge-aeropuerto       { background: var(--c-aero-d);    color: var(--c-aero); }
  .badge-sunflower        { background: var(--c-sun-d);     color: var(--c-sun); }
  .badge-cultura          { background: var(--c-cultura-d); color: var(--c-cultura); }
  .badge-hotel            { background: var(--c-super-d);   color: var(--c-super); }
  .badge-default          { background: var(--fog);         color: var(--soft-ink); }
  .pop-verif {
    display: inline-flex; align-items: center; gap: 3px;
    font-size: 9px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;
    padding: 2px 7px; border-radius: 4px;
  }
  .verif-VERIFICADO    { background: #dcfce7; color: #15803d; }
  .verif-PENDIENTE     { background: #fef9c3; color: #854d0e; }
  .verif-NO_VERIFICADO { background: #fee2e2; color: #b91c1c; }
  .pop-nombre { font-family: var(--font-head); font-size: 15px; line-height: 1.3; color: var(--ink); font-weight: 400; padding-right: 20px; }
  .pop-body { padding: 10px 16px 14px; display: flex; flex-direction: column; gap: 7px; background: var(--mist); }
  .pop-row { display: flex; gap: 7px; align-items: flex-start; font-size: 12.5px; color: var(--soft-ink); line-height: 1.45; }
  .pop-row .ico { flex-shrink: 0; font-size: 12px; margin-top: 2px; }
  .pop-hs {
    background: var(--c-super-d); border: 1px solid #a7f3d0; border-radius: 6px;
    padding: 7px 10px; font-size: 12px; color: var(--ink); display: flex; align-items: center; gap: 7px;
  }
  .pop-info {
    background: var(--c-sun-d); border: 1px solid #fde68a; border-radius: 6px;
    padding: 7px 10px; font-size: 12px; color: var(--ink); display: flex; align-items: flex-start; gap: 7px; line-height: 1.45;
  }
  .pop-info.aero { background: var(--c-aero-d); border-color: #c4b5fd; }
  .pop-fuente {
    display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--soft-ink);
    padding-top: 6px; border-top: 1px solid var(--border); margin-top: 1px;
  }
  .pop-fuente a { color: var(--c-super); text-decoration: none; word-break: break-all; font-weight: 500; }
  .pop-fuente a:hover { text-decoration: underline; }

  /* MARKERS */
  .marker-wrap { width: 32px; height: 38px; }
  .marker-body {
    width: 32px; height: 32px; border-radius: 50% 50% 50% 0; transform: rotate(-45deg);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.22), 0 0 0 2px rgba(255,255,255,0.65);
  }
  .marker-icon { transform: rotate(45deg); font-size: 14px; line-height: 1; }
  .m-supermercado     { background: var(--c-super); }
  .m-biblioteca       { background: var(--c-bib); }
  .m-sala_estudio     { background: var(--c-bib); }
  .m-espacio_natural  { background: var(--c-nat); }
  .m-centro_comercial { background: var(--c-super); }
  .m-centro_civico    { background: var(--c-civico); }
  .m-aeropuerto       { background: var(--c-aero); }
  .m-sunflower        { background: var(--c-sun); }
  .m-cultura          { background: var(--c-cultura); }
  .m-hotel            { background: var(--c-super); }
  .m-default          { background: var(--soft-ink); }

  /* LEGEND */
  #legend {
    position: absolute; bottom: 20px; right: 12px;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(226,232,240,0.9);
    border-radius: var(--r);
    padding: 12px 14px;
    box-shadow: var(--shadow-lg);
    z-index: 500; min-width: 182px;
  }
  #legend h4 { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--soft-ink); margin-bottom: 9px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  .leg-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; font-size: 11px; color: var(--ink); }
  .leg-row:last-child { margin-bottom: 0; }
  .leg-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }

  /* COUNT */
  #count-badge {
    position: absolute; top: 12px; right: 12px;
    background: rgba(255,255,255,0.96);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(226,232,240,0.9);
    border-radius: 8px;
    padding: 7px 14px; font-size: 12.5px; font-weight: 600; color: var(--ink);
    box-shadow: var(--shadow-lg); z-index: 1000; pointer-events: none;
  }
  #count-badge b { color: var(--ink); font-weight: 700; }

  @media (max-width: 768px) {
    #header { gap: 8px; padding: 6px 12px; min-height: 44px; }
    .logo-img { height: 30px; }
    .header-nav { gap: 2px; }
    .header-nav a { padding: 4px 8px; font-size: 10px; }
    #toolbar { padding: 5px 8px; gap: 3px; }
    .chip { padding: 4px 8px; font-size: 10px; }
    .tb-label { display: none; }
    .tb-sep { display: none; }
    .search-wrap { min-width: 90px; padding: 3px 7px; }
    #search-input { font-size: 10px; }
    #btn-suggest { font-size: 10px; padding: 4px 8px; }
    #count-badge { padding: 4px 8px; font-size: 11px; top: 8px; right: 8px; }
    #legend { display: none; }
    .leaflet-popup-content-wrapper { min-width: 220px; max-width: 280px; }
    .pop-header { padding: 10px 12px 8px; }
    .pop-body { padding: 8px 12px 10px; }
    .pop-nombre { font-size: 13px; }
    .pop-row { font-size: 11.5px; }
  }
  @media (max-width: 480px) {
    #header { gap: 6px; padding: 4px 10px; }
    .logo-img { height: 26px; }
    .header-nav a { padding: 3px 6px; font-size: 9px; }
    #toolbar { padding: 4px 6px; gap: 2px; }
    .chip { padding: 3px 6px; font-size: 9px; gap: 2px; }
    .chip i { font-size: 9px; }
    .search-wrap { min-width: 70px; }
    #btn-suggest { display: none; }
    .leaflet-popup-content-wrapper { min-width: 200px; max-width: 260px; }
  }
</style>
</head>
<body>

<header id="header">
  <a href="index.html" class="logo"><img src="logo-icon.png" alt="Neuroconecta" class="logo-img"></a>
  <nav class="header-nav">
    <a href="index.html">Inicio</a>
    <a href="mapa-app.html" class="active">Mapa</a>
    <a href="herramientas.html">Herramientas</a>
    <a href="saturado.html" class="cl" aria-label="Apoyo en crisis"><i class="fa-solid fa-heart-pulse"></i> Necesito ayuda</a>
  </nav>
</header>

<div id="toolbar">
  <div class="search-wrap">
    <svg class="search-ico" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="search-input" type="search" placeholder="Buscar lugar, ciudad…" oninput="doSearch(this.value)" onkeydown="if(event.key==='Escape')clearSearch()" autocomplete="off" spellcheck="false">
    <button id="search-clear" onclick="clearSearch()" aria-label="Limpiar">×</button>
  </div>
  <div class="tb-sep"></div>
  <span class="tb-label">Filtrar</span>
  <button class="chip active" data-cat="all"              onclick="ft('all')"><i class="fa-solid fa-map"></i> Todos</button>
  <button class="chip"        data-cat="supermercado"     onclick="ft('supermercado')"><i class="fa-solid fa-cart-shopping"></i> Hora silenciosa</button>
  <button class="chip"        data-cat="centro_comercial" onclick="ft('centro_comercial')"><i class="fa-solid fa-store"></i> C. Comercial</button>
  <button class="chip"        data-cat="aeropuerto"       onclick="ft('aeropuerto')"><i class="fa-solid fa-plane"></i> Aeropuertos</button>
  <button class="chip"        data-cat="sunflower"        onclick="ft('sunflower')"><i class="fa-solid fa-sun"></i> Discap. invisible</button>
  <button class="chip"        data-cat="biblioteca"       onclick="ft('biblioteca')"><i class="fa-solid fa-book"></i> Bibliotecas</button>
  <button class="chip"        data-cat="espacio_natural"  onclick="ft('espacio_natural')"><i class="fa-solid fa-leaf"></i> Naturaleza</button>
  <button class="chip"        data-cat="cultura"          onclick="ft('cultura')"><i class="fa-solid fa-masks-theater"></i> Cultura</button>
  <button class="chip"        data-cat="centro_civico"    onclick="ft('centro_civico')"><i class="fa-solid fa-landmark"></i> Cívico</button>
  <button class="chip"        data-cat="hotel"            onclick="ft('hotel')"><i class="fa-solid fa-hotel"></i> Hoteles</button>
  <div class="spacer"></div>
  <a id="btn-suggest" href="#" onclick="openSuggest();return false;">+ Sugerir lugar</a>
</div>

<div id="map-container">
  <div id="map"></div>
  <div id="count-badge"><b id="count-num">–</b> lugares visibles</div>
  <div id="legend">
    <h4>Leyenda</h4>
    <div class="leg-row"><span class="leg-dot" style="background:#0d9488"></span>Hora silenciosa / Alojamiento</div>
    <div class="leg-row"><span class="leg-dot" style="background:#7c3aed"></span>Aeropuerto</div>
    <div class="leg-row"><span class="leg-dot" style="background:#d97706"></span>Discapacidad invisible</div>
    <div class="leg-row"><span class="leg-dot" style="background:#b45309"></span>Biblioteca / Estudio</div>
    <div class="leg-row"><span class="leg-dot" style="background:#16a34a"></span>Espacio natural</div>
    <div class="leg-row"><span class="leg-dot" style="background:#dc2626"></span>Cultura / Restaurantes</div>
    <div class="leg-row"><span class="leg-dot" style="background:#2563eb"></span>Cívico / Servicios</div>
  </div>
</div>

<script>
const TIPO_FA={supermercado:"fa-cart-shopping",biblioteca:"fa-book",sala_estudio:"fa-pencil",espacio_natural:"fa-leaf",centro_civico:"fa-landmark",centro_comercial:"fa-store",aeropuerto:"fa-plane",sunflower:"fa-sun",cultura:"fa-masks-theater",museo:"fa-palette",hotel:"fa-hotel",coworking:"fa-briefcase",otro:"fa-location-dot"};
const TIPO_LABEL={supermercado:"Hora silenciosa",biblioteca:"Biblioteca / Estudio",sala_estudio:"Sala de estudio",espacio_natural:"Espacio natural",centro_civico:"Centro cívico",centro_comercial:"Centro comercial",aeropuerto:"Aeropuerto",sunflower:"Discapacidad invisible",cultura:"Cultura",museo:"Museo",hotel:"Hotel",coworking:"Coworking",otro:"Otro"};
const ic = t => `<i class="fa-solid ${TIPO_FA[t]||'fa-location-dot'}"></i>`;
const lb = t => TIPO_LABEL[t] || t;

function mkMarker(tipo) {
  return L.divIcon({ className:"", iconSize:[32,38], iconAnchor:[16,38], popupAnchor:[0,-40],
    html:`<div class="marker-wrap"><div class="marker-body m-${tipo||'default'}"><span class="marker-icon">${ic(tipo)}</span></div></div>`
  });
}

function mkPopup(p) {
  const t  = p.tipo || "default";
  const vi = p.verificacion === "VERIFICADO" ? "✓" : "⏳";
  const vc = `verif-${p.verificacion||"PENDIENTE"}`;
  const hs = p.hora_silenciosa
    ? `<div class="pop-hs"><span><i class="fa-solid fa-volume-off"></i></span><div><b>Hora silenciosa</b><br>${p.hora_silenciosa}</div></div>` : "";
  let info = "";
  if (t === "sunflower") {
    info = `<div class="pop-info"><span><i class="fa-solid fa-sun"></i></span><div>Establecimientos adheridos al programa <b>Hidden Disabilities Sunflower</b>. El personal reconoce el cordón de girasol y ofrece ayuda discreta.<br><a href="https://hdsunflower.com/find-the-sunflower" target="_blank" rel="noopener">Ver mapa oficial →</a></div></div>`;
  } else if (t === "aeropuerto" && p.fuente_tramite) {
    info = `<div class="pop-info aero"><span><i class="fa-solid fa-wheelchair-move"></i></span><div>Solicita el <b>Distintivo de Discapacidad Invisible de AENA</b> antes de tu vuelo:<br><a href="${p.fuente_tramite}" target="_blank" rel="noopener">Formulario AENA →</a></div></div>`;
  }
  const dir  = p.direccion       ? `<div class="pop-row"><span class="ico"><i class="fa-solid fa-location-dot"></i></span><span>${p.direccion}</span></div>` : "";
  const hor  = p.horario_general ? `<div class="pop-row"><span class="ico"><i class="fa-regular fa-clock"></i></span><span>${p.horario_general}</span></div>` : "";
  const desc = p.descripcion     ? `<div class="pop-row"><span class="ico"><i class="fa-solid fa-circle-info"></i></span><span>${p.descripcion}</span></div>` : "";
  const srcLabel = p.fuente_nota || "Fuente verificada";
  const src  = p.fuente_url ? `<div class="pop-fuente"><i class="fa-solid fa-link"></i> <a href="${p.fuente_url}" target="_blank" rel="noopener">${srcLabel}</a></div>` : "";

var lyr = L.layerGroup().addTo(leafletMap);
var mkrs = FEATURES.map(({c,p}) => {
  const m = L.marker([c[1],c[0]], {icon:mkMarker(p.tipo)});
  m.bindPopup(mkPopup(p), {maxWidth:330});
  m._tipo = p.tipo;
  m._q = [(p.nombre||""),(p.ciudad||""),(p.comunidad_autonoma||""),(p.direccion||""),(p.descripcion||"")].join(" ").toLowerCase();
  return m;
});

var activeCat = "all", srch = "";
function render() {
  lyr.clearLayers();
  const q = srch.trim().toLowerCase();
  const vis = mkrs.filter(m => (activeCat === "all" || m._tipo === activeCat) && (!q || m._q.includes(q)));
  vis.forEach(m => lyr.addLayer(m));
  document.getElementById("count-num").textContent = vis.length;
}
function ft(cat) {
  activeCat = cat;
  document.querySelectorAll(".chip").forEach(c => c.classList.toggle("active", c.dataset.cat === cat));
  render();
}
function doSearch(val) {
  srch = val;
  document.getElementById("search-clear").classList.toggle("vis", val.length > 0);
  render();
}
function clearSearch() {
  srch = "";
  const inp = document.getElementById("search-input");
  if (inp) { inp.value = ""; inp.focus(); }
  document.getElementById("search-clear").classList.remove("vis");
  render();
}
function openSuggest() {
  alert("Para sugerir un nuevo lugar necesitamos:\n\n• Nombre y dirección\n• Tipo (supermercado, biblioteca, espacio natural, aeropuerto…)\n• Descripción de la medida\n• URL de una fuente pública que lo confirme\n\nTodos los lugares se verifican antes de publicarse.\nEnvía la info a: atlasseek@proton.me");
}
render();

// Click en mapa para sugerir lugar (verifica que sea tierra con reverse geocoding)
leafletMap.on('click', function(e) {
  var lat = e.latlng.lat.toFixed(5);
  var lng = e.latlng.lng.toFixed(5);
  fetch('https://nominatim.openstreetmap.org/reverse?lat=' + lat + '&lon=' + lng + '&format=json&zoom=10')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (!data.address || data.error) {
        L.popup().setLatLng(e.latlng).setContent(
          '<div style="font-family:var(--font-body);padding:4px;font-size:13px;color:#64748b">' +
          '<i class="fa-solid fa-water" style="color:#3A82CA;margin-right:5px"></i>Esta zona es agua. Pulsa sobre tierra para sugerir un lugar.</div>'
        ).openOn(leafletMap);
        return;
      }
      var lugar = data.display_name ? data.display_name.split(',').slice(0,3).join(',') : '';
      var html = '<div style="font-family:var(--font-body);max-width:280px">' +
        '<div style="font-size:14px;font-weight:600;margin-bottom:8px"><i class="fa-solid fa-plus" style="color:#0d9488;margin-right:5px"></i>Sugerir un lugar aqu\u00ed</div>' +
        (lugar ? '<div style="font-size:11.5px;color:#0f172a;margin-bottom:4px">' + lugar + '</div>' : '') +
        '<div style="font-size:11px;color:#64748b;margin-bottom:10px">Coordenadas: ' + lat + ', ' + lng + '</div>' +
        '<div style="font-size:12.5px;color:#0f172a;line-height:1.5;margin-bottom:10px">' +
        'Para a\u00f1adir este lugar, env\u00eda un email con:' +
        '<ul style="margin:6px 0 0 16px;padding:0">' +
        '<li>Nombre del lugar</li>' +
        '<li>Tipo (supermercado, biblioteca, etc.)</li>' +
        '<li>Descripci\u00f3n de la medida de accesibilidad</li>' +
        '<li>URL de una fuente p\u00fablica que lo confirme</li>' +
        '</ul></div>' +
        '<a href="mailto:atlasseek@proton.me?subject=Sugerencia%20Neuroconecta&body=Coordenadas:%20' + lat + ',%20' + lng + '%0AZona:%20' + encodeURIComponent(lugar) + '%0ANombre:%20%0ATipo:%20%0ADescripci%C3%B3n:%20%0AFuente%20URL:%20" ' +
        'style="display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:6px;background:#0d9488;color:#fff;text-decoration:none;font-size:12px;font-weight:600">' +
        '<i class="fa-solid fa-envelope"></i> Enviar sugerencia</a>' +
        '</div>';
      L.popup().setLatLng(e.latlng).setContent(html).openOn(leafletMap);
    })
    .catch(function() {
      // Si falla la API, permitir igualmente
      var html = '<div style="font-family:var(--font-body);max-width:280px">' +
        '<div style="font-size:14px;font-weight:600;margin-bottom:8px"><i class="fa-solid fa-plus" style="color:#0d9488;margin-right:5px"></i>Sugerir un lugar aqu\u00ed</div>' +
        '<div style="font-size:11px;color:#64748b;margin-bottom:10px">Coordenadas: ' + lat + ', ' + lng + '</div>' +
        '<a href="mailto:atlasseek@proton.me?subject=Sugerencia%20Neuroconecta&body=Coordenadas:%20' + lat + ',%20' + lng + '%0ANombre:%20%0ATipo:%20%0ADescripci%C3%B3n:%20%0AFuente%20URL:%20" ' +
        'style="display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:6px;background:#0d9488;color:#fff;text-decoration:none;font-size:12px;font-weight:600">' +
        '<i class="fa-solid fa-envelope"></i> Enviar sugerencia</a></div>';
      L.popup().setLatLng(e.latlng).setContent(html).openOn(leafletMap);
    });
});
</script>
