<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Herramientas — Neuroconecta</title>
<meta name="description" content="Catálogo de apps, webs y recursos digitales para personas neurodivergentes." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<script src="https://unpkg.com/papaparse@5.5.3/papaparse.min.js"></script>
<style>
  :root{--bg:#0C0E1E;--surface:#13152B;--surface-h:#1A1D38;--border:rgba(129,106,183,.1);--border-h:rgba(129,106,183,.2);--text:#E5E7EB;--muted:#9CA3AF;--faint:#6B7280;--pri:#3A82CA;--pri-g:rgba(58,130,202,.1);--sec:#816AB7;--sec-g:rgba(129,106,183,.1);--acc:#48B0A1;--acc-g:rgba(72,176,161,.1);--green:#9CC156;--green-g:rgba(156,193,86,.1);--warm:#FBB027;--warm-g:rgba(251,176,39,.1);--coral:#E57B86;--coral-g:rgba(229,123,134,.1);--grn:rgba(156,193,86,.1);--grn-f:#9CC156;--blu:rgba(58,130,202,.1);--blu-f:#3A82CA;--org:rgba(251,176,39,.1);--org-f:#FBB027;--r:14px;--font:'Inter',system-ui,sans-serif}
  @media(prefers-reduced-motion:reduce){*,*::before,*::after{transition-duration:0s!important}}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100dvh}
  .site-header{position:sticky;top:0;z-index:50;background:rgba(12,14,30,.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 24px}
  .hdr{max-width:1060px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:16px;min-height:80px;padding:10px 0}
  .logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit}
  .logo-img{height:64px;width:auto;display:block}
  nav{display:flex;gap:2px;align-items:center}
  nav a{padding:8px 14px;border-radius:8px;font-size:14px;font-weight:500;color:var(--muted);text-decoration:none;transition:all .15s}
  nav a:hover,nav a.active{background:rgba(255,255,255,.06);color:var(--text)}
  nav .cl{color:var(--coral);border:1px solid rgba(229,123,134,.25);margin-top:4px}nav .cl:hover{background:var(--coral-g)}
  :focus-visible{outline:2px solid var(--pri);outline-offset:2px}
  main{max-width:1060px;margin:0 auto;padding:40px 24px 48px}
  .pg h1{font-size:28px;font-weight:700;letter-spacing:-.02em}.pg h1 i{color:var(--sec);margin-right:8px}
  .pg p{margin-top:8px;font-size:15px;color:var(--muted)}
  .filters{margin-top:24px;padding:18px;border-radius:14px;background:var(--surface);border:1px solid var(--border);display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
  .filters label{display:flex;flex-direction:column;gap:5px}
  .filters label span{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--faint)}
  .filters input,.filters select{padding:9px 12px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;outline:none;transition:border-color .15s}
  .filters input:focus,.filters select:focus{border-color:var(--pri);box-shadow:0 0 0 3px rgba(56,189,248,.12)}
  .filters select option{background:var(--bg);color:var(--text)}
  #grid{margin-top:24px;display:grid;gap:16px;grid-template-columns:repeat(auto-fill,minmax(300px,1fr))}
  .rc{display:flex;flex-direction:column;padding:22px;border-radius:14px;background:var(--surface);border:1px solid var(--border);transition:border-color .2s,box-shadow .2s}
  .rc:hover{border-color:var(--border-h);box-shadow:0 8px 28px rgba(0,0,0,.3)}
  .rc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px}
  .rc-name{font-size:17px;font-weight:600}
  .bv{flex-shrink:0;padding:3px 9px;border-radius:6px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
  .bv-e{background:var(--pri-g);color:var(--pri)}.bv-mb{background:rgba(255,255,255,.06);color:var(--text)}.bv-b{background:rgba(255,255,255,.03);color:var(--faint)}
  .tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
  .tag{padding:3px 9px;border-radius:6px;font-size:10px;font-weight:600}
  .t-cat{background:var(--pri-g);color:var(--pri)}.t-sub{background:rgba(255,255,255,.04);color:var(--faint)}
  .t-g{background:var(--grn);color:var(--grn-f)}.t-f{background:var(--blu);color:var(--blu-f)}.t-p{background:var(--org);color:var(--org-f)}
  .rc-desc{font-size:13px;line-height:1.55;color:var(--muted);margin-bottom:10px}
  .rc-notes{font-size:12px;font-style:italic;color:var(--faint);margin-bottom:10px}
  .rc-ft{margin-top:auto;padding-top:10px;border-top:1px solid var(--border);display:flex;flex-wrap:wrap;gap:4px}
  .bp{padding:3px 8px;border-radius:5px;font-size:10px;font-weight:600;background:var(--acc-g);color:var(--acc);border:1px solid rgba(72,176,161,.15)}
  .bpl{padding:3px 8px;border-radius:5px;font-size:10px;background:rgba(255,255,255,.05);color:var(--faint)}
  .rc-lk{display:inline-flex;align-items:center;gap:5px;margin-top:10px;font-size:13px;font-weight:600;color:var(--pri);text-decoration:none}
  .rc-lk:hover{text-decoration:underline}
  .empty{text-align:center;padding:60px 20px;color:var(--faint);font-size:15px}
  @media(max-width:768px){
    .site-header{padding:0 16px}
    .hdr{min-height:56px;padding:6px 0;gap:8px}
    .logo-img{height:36px}
    nav a{padding:6px 10px;font-size:12px}
    nav .cl{margin-top:0;padding:6px 8px;font-size:11px}
    main{padding:24px 16px 32px}
    .pg h1{font-size:22px}
    .filters{grid-template-columns:1fr;padding:14px}
    #grid{grid-template-columns:1fr;gap:12px}
    .rc{padding:16px}
    .rc-name{font-size:15px}
  }
  @media(max-width:480px){
    .logo-img{height:30px}
    nav a{padding:5px 7px;font-size:11px}
    nav .cl{padding:5px 7px;font-size:10px}
    .pg h1{font-size:20px}
  }
</style>
</head>
<body>
<header class="site-header"><div class="hdr">
  <a href="index.html" class="logo"><img src="logo-icon.png" alt="Neuroconecta" class="logo-img"></a>
  <nav>
    <a href="index.html">Inicio</a>
    <a href="mapa-app.html">Mapa</a>
    <a href="herramientas.html" class="active">Herramientas</a>
    <a href="saturado.html" class="cl"><i class="fa-solid fa-heart-pulse"></i> Saturado</a>
  </nav>
</div></header>
<main>
  <div class="pg"><h1><i class="fa-solid fa-toolbox"></i>Herramientas</h1><p id="count-label">Cargando recursos…</p></div>
  <section class="filters">
    <label><span><i class="fa-solid fa-magnifying-glass"></i> Buscar</span><input type="search" id="f-search" placeholder="Buscar herramienta…" autocomplete="off" /></label>
    <label><span><i class="fa-solid fa-layer-group"></i> Categoría</span><select id="f-cat"><option value="Todas">Todas</option></select></label>
    <label><span><i class="fa-solid fa-user"></i> Perfil ND</span><select id="f-perfil"><option value="Todos">Todos</option></select></label>
    <label><span><i class="fa-solid fa-tag"></i> Precio</span><select id="f-precio"><option value="Todos">Todos</option></select></label>
  </section>
  <div id="grid"></div>
</main>
<script>
const EXCLUIR=new Set(["PAS","ANS"]);let allData=[];
function pc(p){return p==="Gratis"?"t-g":p==="Freemium"?"t-f":p==="Pago"?"t-p":"t-sub"}
function vc(v){return v==="Excelente"?"bv-e":v==="Muy bueno"?"bv-mb":"bv-b"}
function renderCard(r){
  const pf=(r["Perfiles ND"]||"").split(",").map(s=>s.trim()).filter(s=>s&&!EXCLUIR.has(s));
  const pl=(r.Plataforma||"").split(",").map(s=>s.trim()).filter(Boolean);
  const vb=r.Valoración?`<span class="bv ${vc(r.Valoración)}">${r.Valoración}</span>`:"";
  const st=r.Subcategoría?`<span class="tag t-sub">${r.Subcategoría}</span>`:"";
  const pt=r.Precio?`<span class="tag ${pc(r.Precio)}">${r.Precio}</span>`:"";
  const nt=r.Notas?`<p class="rc-notes">${r.Notas}</p>`:"";
  const lk=r.Enlace?`<a class="rc-lk" href="${r.Enlace}" target="_blank" rel="noopener noreferrer">Visitar <i class="fa-solid fa-arrow-up-right-from-square" style="font-size:10px"></i></a>`:"";
  return`<article class="rc"><div class="rc-top"><h3 class="rc-name">${r.Recurso}</h3>${vb}</div><div class="tags"><span class="tag t-cat">${r.Categoría}</span>${st}${pt}</div><p class="rc-desc">${r["Por qué funciona"]||""}</p>${nt}<div class="rc-ft">${pf.map(p=>`<span class="bp">${p}</span>`).join("")}${pl.map(p=>`<span class="bpl">${p}</span>`).join("")}</div>${lk}</article>`;
}
function getFiltered(){
  const q=document.getElementById("f-search").value.trim().toLowerCase(),cat=document.getElementById("f-cat").value,perfil=document.getElementById("f-perfil").value,precio=document.getElementById("f-precio").value;
  return allData.filter(d=>{
    if(cat!=="Todas"&&d.Categoría!==cat)return false;if(precio!=="Todos"&&d.Precio!==precio)return false;
    if(perfil!=="Todos"){const pf=(d["Perfiles ND"]||"").split(",").map(s=>s.trim()).filter(s=>!EXCLUIR.has(s));if(!pf.includes(perfil))return false}
    if(q){const h=`${d.Recurso} ${d["Por qué funciona"]} ${d.Subcategoría} ${d.Notas}`.toLowerCase();if(!h.includes(q))return false}
    return true;
  });
}
function render(){const f=getFiltered(),g=document.getElementById("grid");g.innerHTML=f.length===0?'<p class="empty">No hay recursos con esos filtros.</p>':f.map(renderCard).join("");document.getElementById("count-label").textContent=`${allData.length} recursos digitales. Filtra por categoría, perfil o precio.`}
function populateSelects(){const cats=new Set(),perfiles=new Set(),precios=new Set();allData.forEach(d=>{if(d.Categoría)cats.add(d.Categoría);if(d.Precio)precios.add(d.Precio);(d["Perfiles ND"]||"").split(",").forEach(p=>{const t=p.trim();if(t&&!EXCLUIR.has(t))perfiles.add(t)})});const fill=(id,set)=>{const sel=document.getElementById(id);[...set].sort().forEach(v=>{const o=document.createElement("option");o.value=v;o.textContent=v;sel.appendChild(o)})};fill("f-cat",cats);fill("f-perfil",perfiles);fill("f-precio",precios)}
fetch("data/herramientas.csv").then(r=>r.text()).then(text=>{const res=Papa.parse(text,{header:true,skipEmptyLines:true});allData=res.data.filter(d=>d.Recurso);populateSelects();render()}).catch(()=>{document.getElementById("grid").innerHTML='<p class="empty">Error al cargar los recursos.</p>'});
["f-search","f-cat","f-perfil","f-precio"].forEach(id=>{document.getElementById(id).addEventListener(id==="f-search"?"input":"change",render)});
</script>
</body>
</html>
