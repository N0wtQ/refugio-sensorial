<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Herramientas — Neuroconecta</title>
<meta name="description" content="Catálogo de apps, webs y recursos digitales para personas neurodivergentes." />
<link rel="icon" href="fav.png" type="image/png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<script src="https://unpkg.com/papaparse@5.5.3/papaparse.min.js"></script>
<style>
  :root {
    --bg: #0C0E1E;
    --surface: #13152B;
    --surface-h: #1A1D38;
    --border: rgba(129,106,183,.1);
    --border-h: rgba(129,106,183,.2);
    --text: #E5E7EB;
    --muted: #9CA3AF;
    --faint: #6B7280;
    --pri: #3A82CA;
    --pri-g: rgba(58,130,202,.1);
    --sec: #816AB7;
    --sec-g: rgba(129,106,183,.1);
    --acc: #48B0A1;
    --acc-g: rgba(72,176,161,.1);
    --green: #9CC156;
    --green-g: rgba(156,193,86,.15);
    --warm: #FBB027;
    --warm-g: rgba(251,176,39,.15);
    --coral: #E57B86;
    --coral-g: rgba(229,123,134,.1);
    --r: 14px;
    --font: 'Inter', system-ui, sans-serif;
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { transition-duration: 0s !important; animation-duration: 0s !important; }
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100dvh; font-size: 16px; }

  /* HEADER */
  .site-header {
    position: sticky; top: 0; z-index: 50;
    background: rgba(12,14,30,.95); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border); padding: 0 24px;
  }
  .hdr {
    max-width: 1060px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
    min-height: 80px; padding: 10px 0;
  }
  .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit; }
  .logo-img { height: 64px; width: auto; display: block; }
  nav { display: flex; gap: 2px; align-items: center; }
  nav a {
    padding: 8px 14px; border-radius: 8px; font-size: 14px; font-weight: 500;
    color: var(--muted); text-decoration: none; transition: all .15s;
  }
  nav a:hover, nav a.active { background: rgba(255,255,255,.06); color: var(--text); }
  nav .cl { color: var(--coral); border: 1px solid rgba(229,123,134,.25); }
  nav .cl:hover { background: var(--coral-g); }
  :focus-visible { outline: 2px solid var(--pri); outline-offset: 2px; }

  /* MAIN */
  main { max-width: 1060px; margin: 0 auto; padding: 40px 24px 48px; }
  .pg h1 { font-size: 28px; font-weight: 700; letter-spacing: -.02em; }
  .pg h1 i { color: var(--sec); margin-right: 8px; }
  .pg p { margin-top: 8px; font-size: 15px; color: var(--muted); }

  /* FILTERS BAR */
  .filter-bar {
    margin-top: 24px; padding: 14px 18px; border-radius: var(--r);
    background: var(--surface); border: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  .search-box {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
    padding: 0 12px; flex: 1; min-width: 200px; transition: border-color .15s;
  }
  .search-box:focus-within { border-color: var(--pri); box-shadow: 0 0 0 3px rgba(56,189,248,.12); }
  .search-box i { color: var(--faint); font-size: 14px; }
  .search-box input {
    flex: 1; padding: 10px 0; border: none; background: transparent;
    color: var(--text); font-family: var(--font); font-size: 14px; outline: none;
  }
  .search-box input::placeholder { color: var(--faint); }
  .search-clear {
    display: none; background: none; border: none; color: var(--faint);
    cursor: pointer; font-size: 16px; padding: 4px; line-height: 1;
  }
  .search-clear.vis { display: flex; align-items: center; }
  .search-clear:hover { color: var(--text); }

  .filter-select { display: flex; align-items: center; gap: 6px; }
  .filter-select label {
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: .1em; color: var(--faint); white-space: nowrap;
  }
  .filter-select select {
    padding: 9px 12px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--bg); color: var(--text); font-family: var(--font);
    font-size: 13px; outline: none; transition: border-color .15s; cursor: pointer;
  }
  .filter-select select:focus { border-color: var(--pri); box-shadow: 0 0 0 3px rgba(56,189,248,.12); }
  .filter-select select option { background: var(--bg); color: var(--text); }

  /* MOBILE FILTER DRAWER */
  .filter-toggle {
    display: none; padding: 10px 18px; border-radius: 10px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); font-family: var(--font); font-size: 14px;
    font-weight: 500; cursor: pointer; gap: 8px; align-items: center;
  }
  .filter-toggle i { color: var(--sec); }
  .filter-advanced { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

  /* GRID */
  #grid {
    margin-top: 24px; display: grid; gap: 16px;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  }

  /* CARD */
  .rc {
    display: flex; flex-direction: column; padding: 24px;
    border-radius: var(--r); background: var(--surface); border: 1px solid var(--border);
    transition: border-color .2s, box-shadow .2s, transform .2s, background .2s;
    text-decoration: none; color: inherit; cursor: pointer;
  }
  .rc:hover { border-color: var(--border-h); box-shadow: 0 8px 28px rgba(0,0,0,.3); transform: translateY(-3px); background: var(--surface-h); }
  .rc:focus-visible { outline: 2px solid var(--pri); outline-offset: 2px; }

  /* CARD HEADER */
  .rc-header { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 16px; }
  .rc-ico {
    width: 46px; height: 46px; border-radius: 12px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 19px;
  }
  .rc-ico.cat-ge  { background: rgba(58,130,202,.15);  color: var(--pri); }
  .rc-ico.cat-rs  { background: rgba(72,176,161,.15);  color: var(--acc); }
  .rc-ico.cat-se  { background: rgba(229,123,134,.15); color: var(--coral); }
  .rc-ico.cat-cs  { background: rgba(251,176,39,.15);  color: var(--warm); }
  .rc-ico.cat-ac  { background: rgba(129,106,183,.15); color: var(--sec); }
  .rc-ico.cat-pl  { background: rgba(58,130,202,.15);  color: var(--pri); }
  .rc-ico.cat-ei  { background: rgba(156,193,86,.15);  color: var(--green); }
  .rc-ico.cat-hf  { background: rgba(251,176,39,.15);  color: var(--warm); }
  .rc-ico.cat-ma  { background: rgba(72,176,161,.15);  color: var(--acc); }
  .rc-ico.cat-em  { background: rgba(156,193,86,.15);  color: var(--green); }
  .rc-ico.cat-al  { background: rgba(251,176,39,.15);  color: var(--warm); }
  .rc-ico.cat-vi  { background: rgba(129,106,183,.15); color: var(--sec); }
  .rc-ico.cat-def { background: var(--sec-g); color: var(--sec); }

  .rc-title-block { flex: 1; min-width: 0; }
  .rc-name { font-size: 17px; font-weight: 700; line-height: 1.3; word-break: break-word; margin-bottom: 5px; }
  .rc-val {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; font-weight: 600;
  }
  .rc-val.excelente { color: var(--warm); }
  .rc-val.muybueno  { color: var(--acc); }
  .rc-val.bueno     { color: var(--muted); }

  /* BADGES */
  .badge {
    flex-shrink: 0; padding: 4px 10px; border-radius: 6px;
    font-size: 11px; font-weight: 600; letter-spacing: .02em; white-space: nowrap;
  }
  .badge-cat      { background: var(--sec-g); color: var(--sec); }
  .badge-gratis   { background: var(--green-g); color: var(--green); }
  .badge-freemium { background: var(--pri-g); color: var(--pri); }
  .badge-pago     { background: rgba(255,255,255,.06); color: var(--faint); }
  .badge-tipo     { background: rgba(255,255,255,.05); color: var(--faint); }

  .badges-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }

  /* NOTES */
  .rc-notes {
    font-size: 13px; line-height: 1.6; color: var(--muted);
    margin-bottom: 14px; flex: 1;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
  }

  /* FOOTER BADGES */
  .rc-ft {
    margin-top: auto; padding-top: 12px; border-top: 1px solid var(--border);
    display: flex; flex-wrap: wrap; gap: 5px; align-items: center;
  }
  .bp {
    padding: 3px 9px; border-radius: 20px; font-size: 10px; font-weight: 700;
    letter-spacing: .03em;
  }
  .bp-TEA     { background: rgba(58,130,202,.15);  color: #60a5fa; border: 1px solid rgba(58,130,202,.25); }
  .bp-TDAH    { background: rgba(156,193,86,.15);  color: var(--green); border: 1px solid rgba(156,193,86,.25); }
  .bp-ANS     { background: rgba(229,123,134,.15); color: var(--coral); border: 1px solid rgba(229,123,134,.25); }
  .bp-PAS     { background: rgba(251,176,39,.15);  color: var(--warm); border: 1px solid rgba(251,176,39,.25); }
  .bp-DIS     { background: rgba(129,106,183,.15); color: var(--sec); border: 1px solid rgba(129,106,183,.25); }
  .bp-AACC    { background: rgba(72,176,161,.15);  color: var(--acc); border: 1px solid rgba(72,176,161,.25); }
  .bp-default { background: rgba(255,255,255,.06); color: var(--faint); border: 1px solid rgba(255,255,255,.1); }
  .bpl {
    padding: 3px 8px; border-radius: 5px; font-size: 10px;
    background: rgba(255,255,255,.05); color: var(--faint);
  }
  .bp-overflow {
    padding: 3px 8px; border-radius: 20px; font-size: 10px; font-weight: 600;
    background: rgba(255,255,255,.06); color: var(--muted); cursor: help;
  }
  .rc-ft-sep { width: 1px; height: 12px; background: var(--border); margin: 0 2px; }

  /* SKELETON */
  .skeleton-card {
    padding: 24px; border-radius: var(--r); background: var(--surface);
    border: 1px solid var(--border); min-height: 180px;
  }
  .skel-line {
    border-radius: 6px; background: linear-gradient(90deg, var(--surface-h) 25%, rgba(255,255,255,.06) 50%, var(--surface-h) 75%);
    background-size: 200% 100%; animation: shimmer 1.5s ease-in-out infinite;
  }
  .skel-title { height: 20px; width: 60%; margin-bottom: 12px; }
  .skel-badge { height: 22px; width: 80px; margin-bottom: 16px; display: inline-block; margin-right: 8px; }
  .skel-text { height: 12px; width: 90%; margin-bottom: 8px; }
  .skel-text2 { height: 12px; width: 70%; }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 60px 20px; color: var(--faint); font-size: 15px; }

  /* LOAD MORE */
  .load-more-wrap { text-align: center; margin-top: 24px; }
  .load-more-btn {
    padding: 14px 36px; border-radius: var(--r); border: 1px solid var(--border);
    background: var(--surface); color: var(--text); font-family: var(--font);
    font-size: 15px; font-weight: 600; cursor: pointer; min-height: 48px;
    transition: all .2s;
  }
  .load-more-btn:hover { background: var(--surface-h); border-color: var(--border-h); }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    .site-header { padding: 0 16px; }
    .hdr { min-height: 56px; padding: 6px 0; gap: 8px; }
    .logo-img { height: 36px; }
    nav a { padding: 6px 10px; font-size: 12px; }
    nav .cl { margin-top: 0; padding: 6px 8px; font-size: 11px; }
    main { padding: 24px 16px 32px; }
    .pg h1 { font-size: 22px; }
    .filter-bar { flex-direction: column; gap: 10px; }
    .search-box { min-width: 100%; }
    .filter-toggle { display: flex; width: 100%; justify-content: center; }
    .filter-advanced { display: none; width: 100%; }
    .filter-advanced.open { display: flex; flex-direction: column; gap: 10px; }
    .filter-select { width: 100%; }
    .filter-select select { flex: 1; width: 100%; }
    #grid { grid-template-columns: 1fr; gap: 12px; }
    .rc { padding: 18px; }
    .rc-name { font-size: 16px; }
  }
  @media (max-width: 480px) {
    .logo-img { height: 30px; }
    nav a { padding: 5px 7px; font-size: 11px; }
    nav .cl { padding: 5px 7px; font-size: 10px; }
    .pg h1 { font-size: 20px; }
  }
</style>
</head>
<body>
<header class="site-header"><div class="hdr">
  <a href="index.html" class="logo"><img src="logo-icon.png" alt="Neuroconecta" class="logo-img"></a>
  <nav>
    <a href="index.html">Inicio</a>
    <a href="mapa-app.html">Mapa</a>
    <a href="herramientas.html" class="active">Herramientas</a>
    <a href="ayuda.html" class="cl" aria-label="Apoyo en crisis"><i class="fa-solid fa-heart-pulse"></i> Necesito ayuda</a>
  </nav>
</div></header>

<main>
  <div class="pg">
    <h1><i class="fa-solid fa-toolbox" aria-hidden="true"></i>Herramientas</h1>
    <p id="count-label">Cargando recursos…</p>
  </div>

  <div class="filter-bar">
    <div class="search-box">
      <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
      <input type="search" id="f-search" placeholder="Buscar herramienta…" autocomplete="off" aria-label="Buscar herramienta" />
      <button class="search-clear" id="search-clear" aria-label="Limpiar búsqueda">&times;</button>
    </div>
    <div class="filter-select">
      <label for="f-cat">Categoría</label>
      <select id="f-cat"><option value="Todas">Todas</option></select>
    </div>
    <div class="filter-select">
      <label for="f-precio">Precio</label>
      <select id="f-precio"><option value="Todos">Todos</option></select>
    </div>
    <button class="filter-toggle" id="filter-toggle" aria-expanded="false" aria-controls="filter-advanced">
      <i class="fa-solid fa-sliders" aria-hidden="true"></i> Más filtros
    </button>
    <div class="filter-advanced" id="filter-advanced">
      <div class="filter-select">
        <label for="f-perfil">Perfil ND</label>
        <select id="f-perfil"><option value="Todos">Todos</option></select>
      </div>
    </div>
  </div>

  <div id="grid">
    <div class="skeleton-card"><div class="skel-line skel-title"></div><div class="skel-line skel-badge"></div><div class="skel-line skel-badge"></div><div class="skel-line skel-text"></div><div class="skel-line skel-text2"></div></div>
    <div class="skeleton-card"><div class="skel-line skel-title"></div><div class="skel-line skel-badge"></div><div class="skel-line skel-badge"></div><div class="skel-line skel-text"></div><div class="skel-line skel-text2"></div></div>
    <div class="skeleton-card"><div class="skel-line skel-title"></div><div class="skel-line skel-badge"></div><div class="skel-line skel-badge"></div><div class="skel-line skel-text"></div><div class="skel-line skel-text2"></div></div>
  </div>
  <div class="load-more-wrap" id="load-more-wrap" style="display:none">
    <button class="load-more-btn" id="load-more-btn">Cargar más</button>
  </div>
</main>

<script>
window.toolsData = [];
var PAGE_SIZE = 12;
var currentPage = 1;

var EXCLUIR = new Set([]);
var CAT_ICONS = {
  "Gestión Ejecutiva": "fa-calendar-check",
  "Regulación Sensorial": "fa-ear-listen",
  "Salud Emocional": "fa-heart",
  "Comunicación Social": "fa-comments",
  "Accesibilidad Cognitiva": "fa-brain",
  "Profesional Laboral": "fa-briefcase",
  "Educación Infantil": "fa-child",
  "Hiperfocos": "fa-fire",
  "Mascotas Apoyo": "fa-paw",
  "Ejercicio Movimiento": "fa-person-running",
  "Alimentación": "fa-utensils",
  "Vida Independiente": "fa-house-user"
};
var CAT_CLASS = {
  "Gestión Ejecutiva": "cat-ge",
  "Regulación Sensorial": "cat-rs",
  "Salud Emocional": "cat-se",
  "Comunicación Social": "cat-cs",
  "Accesibilidad Cognitiva": "cat-ac",
  "Profesional Laboral": "cat-pl",
  "Educación Infantil": "cat-ei",
  "Hiperfocos": "cat-hf",
  "Mascotas Apoyo": "cat-ma",
  "Ejercicio Movimiento": "cat-em",
  "Alimentación": "cat-al",
  "Vida Independiente": "cat-vi"
};
var BP_CLASS = {
  "TEA": "bp-TEA", "TDAH": "bp-TDAH", "TDA": "bp-TDAH",
  "ANS": "bp-ANS", "PAS": "bp-PAS", "DIS": "bp-DIS",
  "AACC": "bp-AACC"
};

function precioClass(p) {
  if (p === "Gratis") return "badge-gratis";
  if (p === "Freemium") return "badge-freemium";
  return "badge-pago";
}

function renderCard(r) {
  var pf = (r["Perfiles ND"] || "").split(",").map(function(s) { return s.trim(); }).filter(function(s) { return s && !EXCLUIR.has(s); });
  var pl = (r.Plataforma || "").split(",").map(function(s) { return s.trim(); }).filter(Boolean);

  var catIcon  = CAT_ICONS[r["Categoría"]] || "fa-toolbox";
  var catClass = CAT_CLASS[r["Categoría"]] || "cat-def";
  var precio   = r.Precio ? '<span class="badge ' + precioClass(r.Precio) + '">' + r.Precio + '</span>' : '';
  var tipo     = r.Tipo   ? '<span class="badge badge-tipo">' + r.Tipo + '</span>' : '';

  var valoracion = r["Valoración"] || r["Valoracion"] || "";
  var valClass = {"Excelente":"excelente","Muy bueno":"muybueno","Bueno":"bueno"}[valoracion] || "";
  var valIcon  = {"Excelente":"fa-star","Muy bueno":"fa-star-half-stroke","Bueno":"fa-thumbs-up"}[valoracion] || "";
  var valHtml  = valoracion && valIcon
    ? '<span class="rc-val ' + valClass + '"><i class="fa-solid ' + valIcon + '"></i> ' + valoracion + '</span>'
    : '';

  var maxPf = 3;
  var visiblePf  = pf.slice(0, maxPf);
  var overflowPf = pf.slice(maxPf);
  var maxPl = 2;
  var visiblePl  = pl.slice(0, maxPl);
  var overflowPl = pl.slice(maxPl);

  var pfHtml = visiblePf.map(function(p) {
    var cls = BP_CLASS[p] || "bp-default";
    return '<span class="bp ' + cls + '">' + p + '</span>';
  }).join("");
  if (overflowPf.length > 0) pfHtml += '<span class="bp-overflow" title="' + overflowPf.join(", ") + '">+' + overflowPf.length + '</span>';

  var plHtml = visiblePl.map(function(p) { return '<span class="bpl">' + p + '</span>'; }).join("");
  if (overflowPl.length > 0) plHtml += '<span class="bp-overflow" title="' + overflowPl.join(", ") + '">+' + overflowPl.length + '</span>';

  var notas    = r.Notas || "";
  var notasHtml = notas ? '<p class="rc-notes">' + notas + '</p>' : '';

  var sep = (pfHtml && plHtml) ? '<span class="rc-ft-sep"></span>' : '';

  var href = r.Enlace || "#";
  return '<a class="rc" href="' + href + '" target="_blank" rel="noopener noreferrer">' +
    '<div class="rc-header">' +
      '<div class="rc-ico ' + catClass + '"><i class="fa-solid ' + catIcon + '" aria-hidden="true"></i></div>' +
      '<div class="rc-title-block">' +
        '<div class="rc-name">' + (r.Recurso || "") + '</div>' +
        valHtml +
      '</div>' +
    '</div>' +
    '<div class="badges-row">' + precio + tipo + '</div>' +
    notasHtml +
    '<div class="rc-ft">' + pfHtml + sep + plHtml + '</div>' +
  '</a>';
}

function getFiltered() {
  var q      = document.getElementById("f-search").value.trim().toLowerCase();
  var cat    = document.getElementById("f-cat").value;
  var perfil = document.getElementById("f-perfil").value;
  var precio = document.getElementById("f-precio").value;

  return window.toolsData.filter(function(d) {
    if (cat !== "Todas" && d["Categoría"] !== cat) return false;
    if (precio !== "Todos" && d.Precio !== precio) return false;
    if (perfil !== "Todos") {
      var pf = (d["Perfiles ND"] || "").split(",").map(function(s) { return s.trim(); }).filter(function(s) { return !EXCLUIR.has(s); });
      if (pf.indexOf(perfil) === -1) return false;
    }
    if (q) {
      var h = (d.Recurso + " " + (d["Por qué funciona"] || "") + " " + (d["Subcategoría"] || "") + " " + (d.Notas || "")).toLowerCase();
      if (h.indexOf(q) === -1) return false;
    }
    return true;
  });
}

function render() {
  currentPage = 1;
  renderPage();
}

function renderPage() {
  var f = getFiltered();
  var g = document.getElementById("grid");
  var total   = f.length;
  var showing = Math.min(currentPage * PAGE_SIZE, total);
  var visible = f.slice(0, showing);

  if (total === 0) {
    g.innerHTML = '<p class="empty"><i class="fa-solid fa-filter-circle-xmark" aria-hidden="true"></i> No hay recursos con esos filtros.</p>';
  } else {
    g.innerHTML = visible.map(renderCard).join("");
  }

  var wrap = document.getElementById("load-more-wrap");
  if (showing < total) {
    wrap.style.display = "";
    document.getElementById("load-more-btn").textContent = "Cargar más (" + (total - showing) + " restantes)";
  } else {
    wrap.style.display = "none";
  }

  document.getElementById("count-label").textContent = total + " de " + window.toolsData.length + " recursos digitales";
}

function populateSelects() {
  var cats    = new Set();
  var perfiles = new Set();
  var precios = new Set();

  window.toolsData.forEach(function(d) {
    if (d["Categoría"]) cats.add(d["Categoría"]);
    if (d.Precio) precios.add(d.Precio);
    (d["Perfiles ND"] || "").split(",").forEach(function(p) {
      var t = p.trim();
      if (t && !EXCLUIR.has(t)) perfiles.add(t);
    });
  });

  function fill(id, set) {
    var sel = document.getElementById(id);
    var arr = Array.from(set).sort();
    arr.forEach(function(v) {
      var o = document.createElement("option");
      o.value = v; o.textContent = v;
      sel.appendChild(o);
    });
  }
  fill("f-cat", cats);
  fill("f-perfil", perfiles);
  fill("f-precio", precios);
}

fetch("data/herramientas.csv")
  .then(function(r) { return r.text(); })
  .then(function(text) {
    var res = Papa.parse(text, { header: true, skipEmptyLines: true, trimHeaders: true, delimiter: ";" });
    window.toolsData = res.data.filter(function(d) { return d.Recurso && d.Recurso.trim(); });
    populateSelects();
    render();
  })
  .catch(function() {
    document.getElementById("grid").innerHTML = '<p class="empty">Error al cargar los recursos.</p>';
  });

["f-search", "f-cat", "f-perfil", "f-precio"].forEach(function(id) {
  document.getElementById(id).addEventListener(id === "f-search" ? "input" : "change", render);
});

document.getElementById("f-search").addEventListener("input", function() {
  document.getElementById("search-clear").classList.toggle("vis", this.value.length > 0);
});

document.getElementById("search-clear").addEventListener("click", function() {
  var inp = document.getElementById("f-search");
  inp.value = "";
  this.classList.remove("vis");
  inp.focus();
  render();
});

document.getElementById("load-more-btn").addEventListener("click", function() {
  currentPage++;
  renderPage();
});

document.getElementById("filter-toggle").addEventListener("click", function() {
  var adv = document.getElementById("filter-advanced");
  var isOpen = adv.classList.toggle("open");
  this.setAttribute("aria-expanded", isOpen);
  this.innerHTML = isOpen
    ? '<i class="fa-solid fa-sliders" aria-hidden="true"></i> Menos filtros'
    : '<i class="fa-solid fa-sliders" aria-hidden="true"></i> Más filtros';
});
</script>
</body>
</html>
